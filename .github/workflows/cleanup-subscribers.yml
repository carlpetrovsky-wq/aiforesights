name: Cleanup Unconfirmed Subscribers

on:
  schedule:
    # Runs daily at 9AM UTC — purges unconfirmed subscribers older than 48hrs
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete unconfirmed subscribers older than 48 hours
        run: |
          echo "Running subscriber cleanup at $(date)"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://www.aiforesights.com/api/admin/cleanup-subscribers" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Cleanup failed with status $RESPONSE"
            exit 1
          fi
          echo "Cleanup completed successfully"
