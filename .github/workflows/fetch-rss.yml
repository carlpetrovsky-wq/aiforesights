name: Fetch RSS Feeds

on:
  schedule:
    # Run 3x daily: 7AM, 1PM, 7PM UTC (2AM, 8AM, 2PM CST)
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Fetch RSS batch 1
        run: |
          echo "Batch 1 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=1" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $HTTP_CODE — $(echo "$RESPONSE" | head -n-1)"

      - name: Wait between batches
        run: sleep 10

      - name: Fetch RSS batch 2
        run: |
          echo "Batch 2 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $HTTP_CODE — $(echo "$RESPONSE" | head -n-1)"

      - name: Wait between batches
        run: sleep 10

      - name: Fetch RSS batch 3
        run: |
          echo "Batch 3 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=3" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $HTTP_CODE — $(echo "$RESPONSE" | head -n-1)"

      - name: Done
        run: echo "All batches complete at $(date)"
