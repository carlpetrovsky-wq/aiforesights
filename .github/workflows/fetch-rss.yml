name: Fetch RSS Feeds

on:
  schedule:
    # 4x daily: 7AM, 1PM, 7PM, 1AM UTC (2AM, 8AM, 2PM, 8PM CST)
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Fetch RSS — Batch 1 (sources 1–12)
        run: |
          echo "Batch 1 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.aiforesights.com/api/rss/fetch?batch=1" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 58) || true
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 2 (sources 13–24)
        run: |
          echo "Batch 2 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.aiforesights.com/api/rss/fetch?batch=2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 58) || true
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 3 (sources 25–36)
        run: |
          echo "Batch 3 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.aiforesights.com/api/rss/fetch?batch=3" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 58) || true
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 4 (sources 37–48, future growth)
        run: |
          echo "Batch 4 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.aiforesights.com/api/rss/fetch?batch=4" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 58) || true
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Summary
        run: echo "RSS pipeline completed at $(date)"
