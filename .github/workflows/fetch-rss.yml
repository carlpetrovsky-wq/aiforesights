name: Fetch RSS Feeds

on:
  schedule:
    # Runs at 7:00 AM UTC daily (2:00 AM CST / 1:00 AM CDT)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Fetch RSS — Batch 1 (sources 1–12)
        run: |
          echo "Batch 1 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=1" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 2 (sources 13–24)
        run: |
          echo "Batch 2 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 3 (sources 25–36)
        run: |
          echo "Batch 3 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=3" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Fetch RSS — Batch 4 (sources 37–48, future growth)
        run: |
          echo "Batch 4 at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiforesights.vercel.app/api/rss/fetch?batch=4" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE | $BODY"

      - name: Summary
        run: echo "RSS pipeline completed at $(date)"
